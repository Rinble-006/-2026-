<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园碳足迹计算器</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", sans-serif;}
        body {background: #e8f5e9; padding: 20px;}
        .container {max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 128, 0, 0.1);}
        h1 {color: #2e7d32; text-align: center; margin-bottom: 20px; font-size: 24px;}
        .title-icon {font-size: 28px; margin-right: 10px;}
        .form-item {margin: 15px 0;}
        label {display: block; margin-bottom: 8px; color: #333; font-weight: 500;}
        select, input {width: 100%; padding: 10px; border: 1px solid #c8e6c9; border-radius: 8px; outline: none; font-size: 16px;}
        select:focus, input:focus {border-color: #4caf50;}
        #calcBtn {width: 100%; padding: 12px; background: #4caf50; color: #fff; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px;}
        #calcBtn:hover {background: #388e3c;}
        .result {margin-top: 25px; padding: 20px; border-radius: 10px; background: #f1f8e9; display: none;}
        .result h3 {color: #2e7d32; margin-bottom: 15px; font-size: 20px;}
        .result p {color: #333; line-height: 1.8; margin: 8px 0; font-size: 16px;}
        .tip {color: #d32f2f; font-weight: 500;}
        .low-carbon {color: #2e7d32; font-weight: 500;}
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="title-icon">🌱</span>校园碳足迹计算器</h1>
        <div class="form-item">
            <label>日常校园通勤方式</label>
            <select id="commute">
                <option value="0">步行/自行车（0kgCO₂/天）</option>
                <option value="0.5">共享单车/电动车（0.5kgCO₂/天）</option>
                <option value="1.5">公交（1.5kgCO₂/天）</option>
                <option value="3">私家车（3kgCO₂/天）</option>
            </select>
        </div>
        <div class="form-item">
            <label>电子设备每日使用时长</label>
            <select id="electric">
                <option value="0.3">≤2小时（0.3kgCO₂/天）</option>
                <option value="0.8">2-4小时（0.8kgCO₂/天）</option>
                <option value="1.5">4-6小时（1.5kgCO₂/天）</option>
                <option value="2.5">≥6小时（2.5kgCO₂/天）</option>
            </select>
        </div>
        <div class="form-item">
            <label>每周纸质打印/用纸量</label>
            <select id="paper">
                <option value="0.2">≤10张（0.2kgCO₂/周）</option>
                <option value="0.6">10-30张（0.6kgCO₂/周）</option>
                <option value="1.2">30-50张（1.2kgCO₂/周）</option>
                <option value="2">≥50张（2kgCO₂/周）</option>
            </select>
        </div>
        <button id="calcBtn">立即计算</button>
        <div class="result" id="result">
            <h3>你的校园碳足迹报告 🌿</h3>
            <p>每日碳排放量：<span id="dailyCarbon" class="low-carbon"></span></p>
            <p>每周碳排放量：<span id="weekCarbon" class="low-carbon"></span></p>
            <p class="tip">👉 你的减排专属建议：</p>
            <p id="suggestion"></p>
        </div>
    </div>

    <script>
        // 获取元素
        const calcBtn = document.getElementById('calcBtn');
        const result = document.getElementById('result');
        const commute = document.getElementById('commute');
        const electric = document.getElementById('electric');
        const paper = document.getElementById('paper');
        const dailyCarbon = document.getElementById('dailyCarbon');
        const weekCarbon = document.getElementById('weekCarbon');
        const suggestion = document.getElementById('suggestion');

        // 计算按钮点击事件
        calcBtn.addEventListener('click', function() {
            // 获取数值
            const c = parseFloat(commute.value);
            const e = parseFloat(electric.value);
            const p = parseFloat(paper.value) / 7; // 周转日
            // 计算每日/每周碳排放量
            const daily = (c + e + p).toFixed(2);
            const week = (daily * 7).toFixed(2);
            // 赋值显示
            dailyCarbon.innerText = daily + ' 千克二氧化碳';
            weekCarbon.innerText = week + ' 千克二氧化碳';
            // 生成减排建议
            let suggest = '';
            if (daily < 1) {
                suggest = '你的碳足迹极低，是校园低碳达人！继续保持步行/骑车通勤，坚持无纸化办公～';
            } else if (daily >=1 && daily < 2) {
                suggest = '碳足迹适中，可优化：尽量用电子文档替代纸质打印，电子设备不用时及时关机～';
            } else if (daily >=2 && daily < 3) {
                suggest = '碳足迹偏高，建议：通勤优先选步行/公交，减少电子设备待机时间，双面打印纸张～';
            } else {
                suggest = '碳足迹较高，急需优化：切换绿色通勤方式，严格控制电子设备使用时长，参与校园旧物回收～';
            }
            suggestion.innerText = suggest;
            // 显示结果区
            result.style.display = 'block';
            // 滚动到结果区
            result.scrollIntoView({behavior: 'smooth'});
        });
    </script>
</body>
</html>
